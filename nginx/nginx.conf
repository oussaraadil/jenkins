server {
    listen 80;
    root /var/www/html;
    index Accueil.php index.php;

    # Gestion des fichiers statiques (CSS, JS, Images)
    location / {
        try_files $uri $uri/ /Accueil.php?$query_string;
    }

    # Configuration PHP
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
    }

    # Sécurité : Interdire l'accès aux fichiers cachés (.htaccess, .git)
    location ~ /\. {
        deny all;
    }
}